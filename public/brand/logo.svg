<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Integrated Architectural Solutions">
  <!-- IAS monogram — a faceted teal tile echoing the folded-panel identity of the
       full lockup (public/brand/logo.jpg). Background-free of the concrete panel so
       it scales cleanly for headers/favicons. The <Wordmark/> text component reads
       the name from lib/brand.ts and does not depend on this file. -->
  <defs>
    <clipPath id="tile"><rect x="0" y="0" width="120" height="120" rx="6"/></clipPath>
  </defs>
  <g clip-path="url(#tile)">
    <!-- faceted teal field, three tones drawn from the mark -->
    <polygon points="0,0 120,0 120,120 0,120" fill="#2F7B96"/>
    <polygon points="0,0 120,0 0,120" fill="#4E9DB5"/>
    <polygon points="120,0 120,120 46,120" fill="#1E3E52"/>
    <polygon points="0,120 78,120 0,44" fill="#2E5E86"/>
  </g>
  <text x="60" y="74" text-anchor="middle" font-family="'Newsreader',Georgia,serif"
        font-size="46" font-weight="600" letter-spacing="1" fill="#F7F6F3">IAS</text>
</svg>
